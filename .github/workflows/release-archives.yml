name: release-archives
on:
  push:
    tags:
      - 'v*'

jobs:
  # v0.4.0 shipped from a red tree: this workflow succeeded while ci failed
  # typecheck on the very same commit, because nothing here runs the gates.
  # The tag and the main push share a SHA, so wait for the ci workflow's run
  # on that SHA and refuse to build unless it concluded success. The two runs
  # start together on `git push origin main vX.Y.Z`, hence the poll; a tag cut
  # later on an already-green commit finds the completed run on the first tick.
  gate:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - name: wait for ci to pass on this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for _ in $(seq 1 60); do
            json=$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs?head_sha=$GITHUB_SHA&event=push&per_page=1")
            status=$(jq -r '.workflow_runs[0].status // empty' <<<"$json")
            conclusion=$(jq -r '.workflow_runs[0].conclusion // empty' <<<"$json")
            if [ "$status" = "completed" ]; then
              if [ "$conclusion" = "success" ]; then
                exit 0
              fi
              echo "ci concluded '$conclusion' on $GITHUB_SHA; refusing to release" >&2
              exit 1
            fi
            echo "ci on $GITHUB_SHA: ${status:-no run found yet}; waiting"
            sleep 30
          done
          echo "timed out waiting for ci on $GITHUB_SHA" >&2
          exit 1

  archives:
    runs-on: ubuntu-latest
    needs: gate
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Cross-compile version-stamped binaries through the flake toolchain.
      # `mage release` reads the version from GITHUB_REF_NAME (the tag), builds
      # per-platform archives into dist/, and writes SHA256SUMS.
      - name: build release artifacts
        run: nix develop --command mage release

      # The release card body is the tagged version's CHANGELOG headline prose
      # plus its Breaking section -- the details stay in CHANGELOG.md, which the
      # card links to. One source of truth; the card can never say something
      # the log does not. test -s fails the workflow when the tagged version
      # has no CHANGELOG section, instead of shipping an empty card.
      - name: extract changelog headline
        run: |
          awk -v ver="${GITHUB_REF_NAME#v}" '
            $0 ~ "^## \\[" ver "\\]" {hit=1; keep=1; next}
            !hit {next}
            /^## \[/ {exit}
            /^### Breaking/ {keep=1; print; next}
            /^### / {keep=0; next}
            keep {print}' CHANGELOG.md > release-body.md
          test -s release-body.md
          printf '\nFull details in the [changelog](https://github.com/enqack/cognosis/blob/%s/CHANGELOG.md).\n' "$GITHUB_REF_NAME" >> release-body.md

      - uses: softprops/action-gh-release@v3
        with:
          body_path: release-body.md
          files: |
            dist/*.tar.gz
            dist/*.tar.xz
            dist/SHA256SUMS
